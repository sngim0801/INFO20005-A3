<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Mate+SC&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mate+SC&family=Mate:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="INFO20005 A3.css">
    <script src="INFO20005 A3.js"></script>
</head>
<body>
    <header>
        <img class="logo" src="Images/Creative House Logo.png" alt="Creative house Logo">
        <h1>Creative House</h1>
    </header>
    <main>
        <div id="navbar">
            <a href="Home Page.html"><img src="Images/Home.png" alt="Home"></a>
            <a href="Home Page.html"><h3>Home</h3></a>
            <div class="bag-wrapper">
                <img src="Images/Shopping Bag Active.png" alt="Shopping Bag">
                <span class="bagBadge" id="bagBadge" style="display:flex;">2</span>
            </div>
            <h3>Shopping <br> Bag</h3>
            <img src="Images/User.png" alt="User">
            <h3>User</h3>
            <img src="Images/Settings.png" alt="Settings">
            <h3>Settings</h3>
        </div>
        <div class="content">
            <div class="title">
                <a href="Shopping Bag Ver2.html"><span class="backButton">&#8249;</span></a>
                <h1>Payment</h1>
            </div>
            <div class="paymentBox">
                <h2>Please enter your details.</h2>
                <div class="form">
                    <form>
                        <label>Name<br>
                            <input type="text" id="inputName" required>
                            <span class="error" id="nameError"></span>
                        </label>
                        <label>Email<br>
                            <input type="email" id="inputEmail" required>
                            <span class="error" id="emailError"></span>
                        </label>
                        <label>Phone Number<br>
                            <input type="text" id="inputPhone" minlength="10" maxlength="11" required>
                            <span class="error" id="phoneError"></span>
                        </label>
                        <label>Address<br>
                            <input type="text" id="inputAddress" required>
                            <span class="error" id="addressError"></span>
                        </label>
                        <label>Card Number<br>
                            <input type="text" id="inputCardNumber" minlength="16" maxlength="16" required>
                            <span class="error" id="cardNumberError"></span>
                        </label>
                        <label>Expiry Date<br>
                            <input type="month" id="inputExpiry" required>
                            <span class="error" id="expiryError"></span>
                        </label>
                        <label>CVV<br>
                            <input type="text" id="inputCvv" minlength="3" maxlength="3" required>
                            <span class="error" id="cvvError"></span>
                        </label>
                    </form>
                    <div class="placeOrder">
                        <button type="button" onclick="validatePayment()" id="placeOrder" class="button">Place Order</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p><strong>Phone:</strong> 03 9362 0770</p>
        <p><strong>Email:</strong> creative.house@bigpond.com</p>
        <p><strong>Address:</strong> Creative House, 14 Ballarat St, Yarraville, VIC, 3013</p>
        <div class="copyright">
            <p>© Copyright Creative House 2026</p>
        </div>
    </footer>
</body>
</html>
