<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation of Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Mate+SC&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mate+SC&family=Mate:ital@0;1&display=swap" rel="stylesheet">

        <img class="logo" src="Images/Creative House Logo.png" alt="Creative house Logo">

    </header>
    <main>
        <div id="navbar">
            <img src="Images/Home.png" alt="Home">
            <h3>Home</h3>
            <img src="Images/Shopping Bag Active.png" alt="Shopping Bag">
            <h3>Shopping <br> Bag</h3>

    <footer>
